<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Сайт-визитка с частицами</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
      color: #fff;
      position: relative;
    }
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: #007acc;
    }
    header {
      padding: 50px 20px;
    }
    section {
      flex: 1;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
    }
    button {
      background: #007acc;
      color: #fff;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 20px;
    }
    button:hover {
      background: #005fa3;
    }
    footer {
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <header>
    <h1>Иван Иванов</h1>
    <p>Веб-разработчик</p>
  </header>

  <section>
    <h2>Обо мне</h2>
    <p>Здравствуйте! Я занимаюсь созданием красивых и удобных сайтов. Обращайтесь для сотрудничества!</p>

    <h2>Контакты</h2>
    <p>Email: ivan@example.com</p>
    <p>Телефон: +7 (900) 123-45-67</p>

    <button onclick="toggleTheme()">Сменить тему</button>
  </section>

  <footer>
    &copy; 2025 Иван Иванов
  </footer>

  <script>
    // Летающие частицы
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const num = 100;

    window.addEventListener('resize', resizeCanvas);
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();

    for (let i = 0; i < num; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        radius: Math.random() * 2 + 1
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < num; i++) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.fill();
      }
      requestAnimationFrame(animate);
    }
    animate();

    // Переключатель темы
    function toggleTheme() {
      if (document.body.style.color === 'black') {
        document.body.style.color = '#fff';
      } else {
        document.body.style.color = 'black';
      }
    }
  </script>
</body>
</html>
